name: Test JS

on:
  workflow_call:

jobs:
  test-js:
    name: Run JS tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Verify Node version
        run: node --version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run JS Tests
        run: npm run test
