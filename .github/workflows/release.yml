name: Release

on:
  push:
    branches:
      - release
      - alpha
      - 'hotfix/**'
      - 'epic/**'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  PNPM_VERSION: 10.33.0

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - name: Configure git
        run: |
          git config user.name "newspack-release-bot"
          git config user.email "newspack-release-bot@users.noreply.github.com"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: pnpm run build:packages
      - name: Build all
        run: pnpm run build
      - name: Release
        run: pnpm exec multi-semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  post-release:
    name: Post-release notifications
    needs: release
    uses: Automattic/newspack-scripts/.github/workflows/reusable-post-release.yml@trunk
    secrets:
      GIT_COMMITTER_TOKEN: ${{ secrets.GH_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_AUTH_TOKEN: ${{ secrets.SLACK_AUTH_TOKEN }}

  # WP.org deploys are plugin-specific and only run on the release branch.
  release-wporg-newsletters:
    name: WP.org / newspack-newsletters
    if: github.ref == 'refs/heads/release'
    needs: release
    uses: Automattic/newspack-scripts/.github/workflows/reusable-release-wporg.yml@trunk
    with:
      plugin-name: newspack-newsletters
      plugin-path: plugins/newspack-newsletters
    secrets:
      WP_ORG_USERNAME: ${{ secrets.WP_ORG_USERNAME }}
      WP_ORG_PASSWORD: ${{ secrets.WP_ORG_PASSWORD }}

  release-wporg-scaip:
    name: WP.org / super-cool-ad-inserter-plugin
    if: github.ref == 'refs/heads/release'
    needs: release
    uses: Automattic/newspack-scripts/.github/workflows/reusable-release-wporg.yml@trunk
    with:
      plugin-name: super-cool-ad-inserter-plugin
      plugin-path: plugins/super-cool-ad-inserter-plugin
    secrets:
      WP_ORG_USERNAME: ${{ secrets.WP_ORG_USERNAME }}
      WP_ORG_PASSWORD: ${{ secrets.WP_ORG_PASSWORD }}

  release-wporg-rtt:
    name: WP.org / republication-tracker-tool
    if: github.ref == 'refs/heads/release'
    needs: release
    uses: Automattic/newspack-scripts/.github/workflows/reusable-release-wporg.yml@trunk
    with:
      plugin-name: republication-tracker-tool
      plugin-path: plugins/republication-tracker-tool
    secrets:
      WP_ORG_USERNAME: ${{ secrets.WP_ORG_USERNAME }}
      WP_ORG_PASSWORD: ${{ secrets.WP_ORG_PASSWORD }}
