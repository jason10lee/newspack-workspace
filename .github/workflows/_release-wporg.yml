name: Release to WordPress.org

# Monorepo-aware WP.org deploy, called once per wp.org-distributed plugin from
# release.yml. Replaces the external newspack-scripts reusable workflow, which
# assumed a single-plugin repo (root-level `release:archive`, `npm ci`, and a
# `vX.Y.Z` git tag) and does not work in this pnpm monorepo.

on:
  workflow_call:
    inputs:
      plugin-name:
        description: 'WordPress.org plugin slug (also the release/ subdirectory name).'
        required: true
        type: string
      plugin-path:
        description: 'Path to the plugin within the monorepo, e.g. plugins/newspack-newsletters.'
        required: true
        type: string
      wporg-slug:
        description: 'WordPress.org slug, if it differs from plugin-name. Defaults to plugin-name.'
        required: false
        default: ''
        type: string
    secrets:
      WP_ORG_USERNAME:
        required: true
      WP_ORG_PASSWORD:
        required: true

env:
  PNPM_VERSION: 10.33.0

jobs:
  release-wporg:
    name: Deploy to WordPress.org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.3'
          tools: composer
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Install PHP dependencies
        run: composer install --no-dev --no-scripts
        working-directory: ${{ inputs.plugin-path }}
      - name: Build shared packages
        run: pnpm run build:packages
      - name: Build plugin and release artifact
        run: |
          pnpm --filter "{${{ inputs.plugin-path }}}" run --if-present build
          pnpm --filter "{${{ inputs.plugin-path }}}" run release:archive
      - name: Resolve released version
        id: ver
        run: echo "version=$(node -p "require('./${{ inputs.plugin-path }}/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Install Subversion
        # ubuntu-latest no longer ships svn; the deploy script needs it (both
        # the already-published check and the commit).
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: Deploy to WordPress.org
        working-directory: ${{ inputs.plugin-path }}
        env:
          WP_ORG_USERNAME: ${{ secrets.WP_ORG_USERNAME }}
          WP_ORG_PASSWORD: ${{ secrets.WP_ORG_PASSWORD }}
          WP_ORG_PLUGIN_NAME: ${{ inputs.plugin-name }}
          WP_ORG_PLUGIN_SLUG: ${{ inputs.wporg-slug != '' && inputs.wporg-slug || inputs.plugin-name }}
          WP_ORG_PLUGIN_VERSION: ${{ steps.ver.outputs.version }}
        run: ${{ github.workspace }}/.github/scripts/release-wporg.sh
