name: Sync legacy repos

# Daily 06:00 UTC mirror of legacy Newspack repos into this monorepo.
#
# bin/migration/sync-legacy.sh runs end-to-end: filters each legacy repo's
# trunk into the monorepo layout, publishes per-repo sync/<name> branches,
# and merges them into monorepo-integration with auto-resolution and per-repo
# escalation (draft PR with @adekbadek as reviewer) for any repo that
# can't be merged automatically. See that script for the policy.
#
# The same script runs locally — DRY_RUN=1 bin/migration/sync-legacy.sh from
# any worktree skips git push and gh pr create.
#
# Manual trigger via workflow_dispatch is available for the day of cutover
# and whenever someone wants fresh legacy commits reflected immediately.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: sync-legacy
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Filter, publish, and integrate
    runs-on: ubuntu-latest
    steps:
      # Sync scripts live on main; the working tree the script merges into
      # is monorepo-integration. Two checkouts keep them separate.
      - name: Check out main (sync scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          path: scripts-src
      - name: Check out monorepo-integration (working tree)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT (not GITHUB_TOKEN) so the sync's pushes to
          # monorepo-integration trigger CI. Commits pushed with GITHUB_TOKEN
          # do not start new workflow runs, which would leave synced changes
          # (and PR #70's checks) silently un-validated.
          token: ${{ secrets.GH_TOKEN }}
          ref: monorepo-integration
          path: integration
      - name: Install git-filter-repo
        run: |
          sudo apt-get update
          sudo apt-get install -y git-filter-repo
      # pnpm + node so the sync script can refresh pnpm-lock.yaml after merges
      # that change plugin/theme package.json files.
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: integration/.nvmrc
      - name: Configure git
        working-directory: integration
        run: |
          git config user.name  "Adam Cassis"
          git config user.email "adam.cassis@automattic.com"
      - name: Run sync
        working-directory: integration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Org-scoped token for cloning private legacy repos (currently
          # only newspack-story-budget). The default GITHUB_TOKEN is scoped
          # to this repo and can't read other private Automattic repos.
          LEGACY_SYNC_GH_TOKEN: ${{ secrets.LEGACY_SYNC_GH_TOKEN }}
        run: ../scripts-src/bin/migration/sync-legacy.sh
      - name: Upload sync logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-legacy-logs
          path: /tmp/sync-legacy/*.log
          if-no-files-found: ignore
          retention-days: 14
