name: Sync legacy repos

# Daily 06:00 UTC mirror of legacy Newspack repos into this monorepo.
#
# bin/migration/sync-legacy.sh runs end-to-end: filters each legacy repo's
# trunk into the monorepo layout, publishes per-repo sync/<name> branches,
# and integrates them onto main. Clean merges are pushed to the
# sync/legacy-incoming branch and landed via a PR the job admin-merges once CI
# passes (merge commit,
# never squash, so per-commit types survive for release versioning); repos that
# can't be merged automatically escalate to a draft PR (@adekbadek reviewer).
# See that script for the policy.
#
# Post-cutover there is no monorepo-integration branch (it was merged into main
# and deleted). main is the integration target; the sync lands legacy commits
# that merged on the now-frozen legacy trunks (new legacy PRs are blocked, but
# already-open ones still merge upstream and must keep flowing in).
#
# Before admin-merging, the sync runs bin/migration/detect-sync-collisions.sh to
# catch silent bad-merges (files blended from both sides into something matching
# neither -- a dropped fix or orphaned code, with no conflict marker). It writes
# a job summary every run; when a non-generated blend is present it HOLDS the
# auto-merge (leaving the PR open) and pings Slack for review, since such a blend
# can pass CI and would otherwise land unseen.
#
# The same script runs locally — DRY_RUN=1 bin/migration/sync-legacy.sh from
# any worktree skips git push and gh pr create.
#
# Manual trigger via workflow_dispatch is available for the day of cutover
# and whenever someone wants fresh legacy commits reflected immediately.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: sync-legacy
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Filter, publish, and integrate
    runs-on: ubuntu-latest
    steps:
      # Sync scripts and the working tree are both main now. Two checkouts keep
      # the read-only script copy (scripts-src) separate from the working tree
      # the script integrates into and pushes from (integration).
      - name: Check out main (sync scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          path: scripts-src
      - name: Check out main (working tree)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the matticbot PAT (not GITHUB_TOKEN) so the sync's push to
          # sync/legacy-incoming triggers CI (GITHUB_TOKEN pushes don't start
          # workflow runs) and so the auto-merge runs as matticbot — the
          # identity allowed to bypass main's required review.
          token: ${{ secrets.GH_TOKEN }}
          ref: main
          path: integration
      - name: Install git-filter-repo
        run: |
          sudo apt-get update
          sudo apt-get install -y git-filter-repo
      # pnpm + node so the sync script can refresh pnpm-lock.yaml after merges
      # that change plugin/theme package.json files.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: integration/.nvmrc
      - name: Configure git
        working-directory: integration
        run: |
          git config user.name  "Adam Cassis"
          git config user.email "adam.cassis@automattic.com"
      - name: Run sync
        working-directory: integration
        env:
          # matticbot PAT: it opens and auto-merges the PR to main (it is the
          # bypass-allowed identity for main's required review) and its branch
          # push triggers CI.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Org-scoped token for cloning private legacy repos (currently
          # only newspack-story-budget). The default GITHUB_TOKEN is scoped
          # to this repo and can't read other private Automattic repos.
          LEGACY_SYNC_GH_TOKEN: ${{ secrets.LEGACY_SYNC_GH_TOKEN }}
          # Slack creds for the silent-blend gate (a8c workspace), reused from
          # the release notifier. When the integrated merge blends monorepo and
          # legacy edits into a result matching neither side, the sync holds the
          # auto-merge and pings here for review. Unset => the gate's ping no-ops
          # (e.g. forks), never failing the sync.
          SLACK_AUTH_TOKEN: ${{ secrets.SLACK_AUTH_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: ../scripts-src/bin/migration/sync-legacy.sh
      - name: Upload sync logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sync-legacy-logs
          path: /tmp/sync-legacy/*.log
          if-no-files-found: ignore
          retention-days: 14
